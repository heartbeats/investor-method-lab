<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>历史跟投首页已停用</title>
    <meta http-equiv="refresh" content="0; url=http://127.0.0.1:8000/" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f3efe5;
        --card: rgba(255, 252, 246, 0.94);
        --ink: #173126;
        --muted: #4d685c;
        --line: rgba(23, 49, 38, 0.12);
        --accent: #1d6b45;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        background:
          radial-gradient(circle at top, rgba(29, 107, 69, 0.18), transparent 42%),
          linear-gradient(180deg, #f8f4ea 0%, var(--bg) 100%);
        color: var(--ink);
        font-family: "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", sans-serif;
      }

      main {
        width: min(640px, 100%);
        padding: 32px;
        border: 1px solid var(--line);
        border-radius: 24px;
        background: var(--card);
        box-shadow: 0 20px 60px rgba(23, 49, 38, 0.08);
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 4vw, 40px);
        line-height: 1.15;
      }

      p {
        margin: 14px 0 0;
        line-height: 1.7;
      }

      .muted {
        color: var(--muted);
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 24px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 44px;
        padding: 0 18px;
        border-radius: 999px;
        text-decoration: none;
        font-weight: 600;
      }

      .btn-primary {
        background: var(--accent);
        color: #fff;
      }

      .btn-secondary {
        border: 1px solid var(--line);
        color: var(--ink);
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Deprecated Home</p>
      <h1>历史跟投首页已停用</h1>
      <p>从现在起默认只保留 <strong>击球区首页</strong> 作为投研主入口，旧 `Investor Method Lab` 首页不再继续作为主页使用。</p>
      <p class="muted">浏览器会自动跳转到 `http://127.0.0.1:8000/`。如果没有自动跳转，可以手动点击下面入口。</p>
      <div class="actions">
        <a class="btn btn-primary" href="http://127.0.0.1:8000/">打开击球区首页</a>
        <a class="btn btn-secondary" href="./investor.html?id=warren_buffett">查看历史投资人详情</a>
        <a class="btn btn-secondary" href="./data-info.html">查看历史数据口径页</a>
      </div>
    </main>
  </body>
</html>
